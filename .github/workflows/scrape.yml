name: scrape

on:
  schedule:
    - cron: "0 1 * * *"      # 每天 09:00（台灣時間 = UTC 01:00）
  workflow_dispatch: {}       # 允許手動觸發（gh workflow run 需要這行）

permissions:
  contents: write             # 讓排程能把 dashboard.json commit 回 repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝相依
        run: pip install -r requirements.txt

      - name: 安裝 Playwright 瀏覽器（免金鑰爬蟲用）
        run: python -m playwright install --with-deps chromium

      - name: 抓 Google 商家評論
        env:
          # 優先序：GOOGLE_MAPS_API_KEY（官方 Places API，評論數最準）
          #   → OUTSCRAPER_API_KEY（付費）→ 都沒設則用免費 Playwright 爬蟲
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
        run: python collector/google_reviews.py

      - name: 抓輿情聲量（新聞／趨勢／PTT，免金鑰）
        run: python collector/buzz.py

      - name: 產生 AI 內容（選用）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: python collector/ai_report.py

      - name: Commit 結果
        run: |
          git config user.name  "ug-bot"
          git config user.email "ug-bot@users.noreply.github.com"
          git add docs/data/
          git commit -m "chore: 更新評論資料 $(date +%F)" || echo "無變更"
          git push
